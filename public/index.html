<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DropMate — live diagram (v2.1)</title>
  <style>
    :root {
      --bg: #07070d;
      /* #119 / #124: idle gray bumped from #2a2a3a (~1.4:1 vs --bg)
         to #707090 (~4.3:1) so cables clear WCAG AA 1.4.11. */
      --idle: #707090;
      --idle-fill: rgba(112, 112, 144, 0.10);
      --text-accent: #00e5ff;
      --photo-accent: #ffb547;
      --callback-accent: #ff5cf2;
      --error-accent: #ff3860;
      /* #124: --label bumped from #6a6a8a (~3.96:1) to #8c8caa
         (~5.6:1) so inside-box text clears AA 1.4.3 normal-text. */
      --label: #8c8caa;
      --label-bright: #e6e6ff;
      --substrate: rgba(190, 190, 220, 0.85);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: #e6e6f0; font-family: ui-monospace, "SF Mono", Menlo, monospace; height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.25rem; }
    h1 { font-size: 0.85rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--label); font-weight: 500; margin: 0; }
    h1 span.version { color: var(--text-accent); margin-left: 0.6rem; }
    .stage { width: 100%; max-width: 1240px; flex: 1; min-height: 0; display: flex; align-items: stretch; justify-content: center; gap: 1rem; }
    .diagram { flex: 1 1 80%; display: flex; align-items: center; justify-content: center; min-width: 0; }
    svg { width: 100%; height: 100%; max-height: 82vh; }

    /* Right-side trace log — same shape as pre-v2.1 (#61). */
    #trace-log {
      flex: 0 0 22%;
      min-width: 240px;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 32, 0.55);
      border: 1px solid var(--idle);
      border-radius: 6px;
      padding: 0.6rem 0.65rem;
      font-size: 10px;
      letter-spacing: 0.02em;
      color: var(--label);
      overflow: hidden;
    }
    #trace-log header {
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--label);
      opacity: 0.85;
      padding-bottom: 0.45rem;
      margin-bottom: 0.45rem;
      border-bottom: 1px solid var(--idle);
    }
    #trace-log-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--idle) transparent;
    }
    #trace-log-body::-webkit-scrollbar { width: 6px; }
    #trace-log-body::-webkit-scrollbar-thumb { background: var(--idle); border-radius: 3px; }
    .log-entry { color: var(--label-bright); opacity: 0.85; line-height: 1.35; word-break: break-word; }
    .log-entry .ts { color: var(--label); opacity: 0.6; margin-right: 0.4rem; }
    .log-entry .stage-phase { color: var(--accent, var(--text-accent)); margin-right: 0.4rem; }
    .log-entry.kind-text { --accent: var(--text-accent); }
    .log-entry.kind-photo { --accent: var(--photo-accent); }
    .log-entry.kind-callback { --accent: var(--callback-accent); }
    .log-entry.flash-error-line { color: var(--error-accent); }

    rect.box {
      fill: var(--idle-fill);
      stroke: var(--idle);
      stroke-width: 2;
      transition: stroke 200ms ease, fill 200ms ease, filter 200ms ease;
    }
    rect.box.ignite {
      stroke: var(--accent, var(--text-accent));
      fill: rgba(0, 229, 255, 0.06);
      filter: drop-shadow(0 0 10px var(--accent, var(--text-accent)));
    }
    rect.box.hold {
      stroke: var(--accent, var(--text-accent));
      filter: drop-shadow(0 0 6px var(--accent, var(--text-accent)));
    }
    rect.box.heartbeat {
      animation: heartbeat 3s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { stroke: var(--idle); filter: none; }
      50% { stroke: #8d8db0; filter: drop-shadow(0 0 4px #8d8db0); }
    }
    rect.edge { stroke: #5e5e7e; }
    rect.edge.heartbeat { animation-duration: 4s; }
    rect.edge.ignite { stroke: var(--accent, var(--text-accent)); fill: rgba(0, 229, 255, 0.04); }

    /* AI Gateway model badges — child boxes that light independently
       per #124 (gemini-2.5-flash on classifier/vision, claude-opus-4.7
       on agent). The outer .gateway-frame stays dim until either
       badge fires; lighting is mediated by the engine, not CSS. */
    rect.badge {
      fill: rgba(112, 112, 144, 0.08);
      stroke: var(--idle);
      stroke-width: 1.4;
      transition: stroke 200ms ease, fill 200ms ease, filter 200ms ease;
    }
    rect.badge.ignite {
      stroke: var(--accent, var(--text-accent));
      fill: rgba(0, 229, 255, 0.10);
      filter: drop-shadow(0 0 8px var(--accent, var(--text-accent)));
    }
    rect.badge.hold {
      stroke: var(--accent, var(--text-accent));
      filter: drop-shadow(0 0 5px var(--accent, var(--text-accent)));
    }

    rect.box.flash-error,
    rect.badge.flash-error {
      stroke: var(--error-accent);
      fill: rgba(255, 56, 96, 0.08);
      filter: drop-shadow(0 0 12px var(--error-accent));
      animation: flash-error 400ms ease-out;
    }
    @keyframes flash-error {
      0% { filter: drop-shadow(0 0 4px var(--error-accent)); }
      40% { filter: drop-shadow(0 0 16px var(--error-accent)); }
      100% { filter: drop-shadow(0 0 8px var(--error-accent)); }
    }

    text.label {
      fill: var(--label-bright);
      font-size: 15px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      text-anchor: middle;
      font-weight: 600;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      transition: fill 200ms ease;
      pointer-events: none;
    }
    text.label.ignite { fill: var(--accent, var(--label-bright)); }
    text.label.hold { fill: var(--accent, var(--label-bright)); }
    text.sub {
      fill: var(--label);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-anchor: middle;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      pointer-events: none;
    }
    text.badge-label {
      fill: var(--label-bright);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-anchor: middle;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      pointer-events: none;
      transition: fill 200ms ease;
    }

    path.cable {
      fill: none;
      stroke: var(--idle);
      stroke-width: 2;
      /* #119 / #124: butt caps so a 1-px nub doesn't extend past the
         box border into the box interior. */
      stroke-linecap: butt;
      stroke-linejoin: round;
      transition: stroke 200ms ease, filter 200ms ease;
    }
    path.cable.run {
      stroke: var(--accent, var(--text-accent));
      filter: drop-shadow(0 0 6px var(--accent, var(--text-accent)));
      stroke-dasharray: 8 6;
      animation: flow 600ms linear forwards;
    }
    path.cable.hold {
      stroke: var(--accent, var(--text-accent));
      filter: drop-shadow(0 0 4px var(--accent, var(--text-accent)));
    }
    @keyframes flow {
      from { stroke-dashoffset: 28; }
      to { stroke-dashoffset: 0; }
    }

    text.zone {
      fill: #5d5d77;
      font-size: 10px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      text-anchor: start;
      pointer-events: none;
      opacity: 0.85;
    }

    text.substrate {
      fill: var(--substrate);
      font-size: 13px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-anchor: middle;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 500;
      pointer-events: none;
    }

    footer { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1240px; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--label); }
    .status { color: var(--label); }
    .status.connected { color: var(--text-accent); }
    .status.connected::before { content: "● "; }
    .legend { display: flex; gap: 1.5rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .swatch { width: 10px; height: 10px; border-radius: 2px; }
    .swatch-text { background: var(--text-accent); box-shadow: 0 0 6px var(--text-accent); }
    .swatch-photo { background: var(--photo-accent); box-shadow: 0 0 6px var(--photo-accent); }
    .swatch-callback { background: var(--callback-accent); box-shadow: 0 0 6px var(--callback-accent); }
  </style>
</head>
<body>
  <h1>DropMate · live diagram<span class="version">v2.1 vercel-primitives</span></h1>
  <div class="stage">
    <div class="diagram">
    <!--
      v2.1 #124 box layout — Vercel-primitives GTM redesign.

      Story: an Ash agent on Vercel deployed primitives. The boxes
      name the primitives, not the application's internal roles:

        TELEGRAM            (external)
                 ↓
        ASH CHANNEL         (telegram.ts)
                 ↓
        ┌──────────┬──────────┬──────────────────┬──────────────┐
        ASH TOOLS  ASH AGENT  VERCEL AI GATEWAY  ASH SCHEDULES
        defineTool defineAgent · gemini-2.5-flash defineSchedule
                              · claude-opus-4.7
        └──────────┴──────────┴──────────────────┴──────────────┘
                 ↓
        UPSTASH REDIS       (Vercel Marketplace)

        ── Running on Vercel · Fluid Compute · Sandbox · OTel @vercel/otel ──

      The two AI Gateway model badges (gemini, claude) ignite
      INDEPENDENTLY per the stage map in public/diagram.js — gemini
      on classifier/vision, claude on agent. The frame lights when
      either badge fires.
    -->
    <svg viewBox="0 0 1000 720" role="img" aria-label="trace pipeline v2.1 vercel-primitives" preserveAspectRatio="xMidYMid meet">
      <text class="zone" x="20" y="40">Telegram</text>
      <text class="zone" x="20" y="230">Vercel</text>

      <!--
        Cables drawn BEFORE boxes so endpoints overlay cleanly.

        Box rectangles (for endpoint reference):
          TELEGRAM:     x=380, y=30,  w=240, h=50   (bottom edge y=80,  center x=500)
          ASH CHANNEL:  x=380, y=130, w=240, h=80   (top y=130, bottom y=210, center x=500)
          ASH TOOLS:    x=40,  y=300, w=200, h=140  (top y=300, bottom y=440, center x=140)
          ASH AGENT:    x=260, y=300, w=200, h=140  (top y=300, bottom y=440, center x=360)
          AI GATEWAY:   x=480, y=300, w=240, h=160  (top y=300, bottom y=460, center x=600)
          ASH SCHEDULES:x=740, y=300, w=220, h=140  (top y=300, bottom y=440, center x=850)
          UPSTASH REDIS:x=380, y=510, w=240, h=60   (top y=510, center x=500, y=540)

        Every endpoint lands ON a box border (no interior penetration).
        Combined with stroke-linecap: butt, no visible cap pokes inside.
      -->

      <!-- TELEGRAM ↔ ASH CHANNEL (inbound origin) -->
      <path class="cable" id="cable-telegram-channel" d="M500 80 L500 130" />

      <!-- ASH CHANNEL → branches (exits from channel bottom edge y=210) -->
      <path class="cable" id="cable-channel-tools"      d="M440 210 L440 270 L140 270 L140 300" />
      <path class="cable" id="cable-channel-agent"      d="M480 210 L480 280 L360 280 L360 300" />
      <path class="cable" id="cable-channel-gateway"    d="M520 210 L520 280 L600 280 L600 300" />
      <path class="cable" id="cable-channel-schedules"  d="M560 210 L560 270 L850 270 L850 300" />

      <!-- ASH CHANNEL → TELEGRAM (return path: channel-deterministic DMs) -->
      <path class="cable" id="cable-channel-telegram"   d="M380 170 L80 170 L80 55 L380 55" />

      <!-- middle row → UPSTASH REDIS (state writes) -->
      <path class="cable" id="cable-tools-redis"        d="M180 440 L180 540 L380 540" />
      <path class="cable" id="cable-agent-redis"        d="M420 440 L420 490 L460 490 L460 510" />
      <path class="cable" id="cable-schedules-redis"    d="M820 440 L820 540 L620 540" />

      <!-- TELEGRAM (origin + destination, top edge) -->
      <rect class="box edge heartbeat" id="box-telegram" x="380" y="30" width="240" height="50" rx="6" />
      <text class="label" id="label-telegram" x="500" y="62">Telegram</text>

      <!-- ASH CHANNEL (orchestrator) -->
      <rect class="box heartbeat" id="box-channel" x="380" y="130" width="240" height="80" rx="6" />
      <text class="label" id="label-channel" x="500" y="167">Ash Channel</text>
      <text class="sub" id="sub-channel" x="500" y="190">telegram.ts</text>

      <!-- ASH TOOLS -->
      <rect class="box heartbeat" id="box-tools" x="40" y="300" width="200" height="140" rx="6" />
      <text class="label" id="label-tools" x="140" y="345">Ash Tools</text>
      <text class="sub" id="sub-tools" x="140" y="370">defineTool</text>

      <!-- ASH AGENT -->
      <rect class="box heartbeat" id="box-agent" x="260" y="300" width="200" height="140" rx="6" />
      <text class="label" id="label-agent" x="360" y="345">Ash Agent</text>
      <text class="sub" id="sub-agent" x="360" y="370">defineAgent</text>

      <!-- VERCEL AI GATEWAY (frame + two model badges) -->
      <rect class="box heartbeat" id="box-ai-gateway" x="480" y="300" width="240" height="160" rx="6" />
      <text class="label" id="label-ai-gateway" x="600" y="338">Vercel AI Gateway</text>
      <!-- gemini badge (lights on classifier/vision) -->
      <rect class="badge" id="box-ai-gateway-gemini" x="500" y="360" width="200" height="32" rx="4" />
      <text class="badge-label" id="label-ai-gateway-gemini" x="600" y="381">gemini-2.5-flash</text>
      <!-- claude badge (lights on agent) -->
      <rect class="badge" id="box-ai-gateway-claude" x="500" y="410" width="200" height="32" rx="4" />
      <text class="badge-label" id="label-ai-gateway-claude" x="600" y="431">claude-opus-4.7</text>

      <!-- ASH SCHEDULES -->
      <rect class="box heartbeat" id="box-schedules" x="740" y="300" width="220" height="140" rx="6" />
      <text class="label" id="label-schedules" x="850" y="345">Ash Schedules</text>
      <text class="sub" id="sub-schedules" x="850" y="370">defineSchedule</text>

      <!-- UPSTASH REDIS (Vercel Marketplace, bottom edge) -->
      <rect class="box edge heartbeat" id="box-redis" x="380" y="510" width="240" height="60" rx="6" />
      <text class="label" id="label-redis" x="500" y="540">Upstash Redis</text>
      <text class="sub" id="sub-redis" x="500" y="560">Vercel Marketplace</text>

      <!-- Substrate strip (dim, always-on; ~30% opacity per #124) -->
      <text class="substrate" id="substrate-strip" x="500" y="615">
        Running on Vercel · Fluid Compute · Sandbox · OTel @vercel/otel
      </text>
    </svg>
    </div>
    <aside id="trace-log" aria-label="trace log">
      <header>Vercel Observability · Agent Runs Trace</header>
      <div id="trace-log-body"></div>
    </aside>
  </div>
  <footer>
    <div class="status" id="status">connecting…</div>
    <div class="legend">
      <div class="legend-item"><span class="swatch swatch-text"></span> text</div>
      <div class="legend-item"><span class="swatch swatch-photo"></span> photo</div>
      <div class="legend-item"><span class="swatch swatch-callback"></span> callback</div>
    </div>
    <div id="trace-id" class="status">—</div>
  </footer>
  <script type="module" src="/diagram.js"></script>
</body>
</html>
